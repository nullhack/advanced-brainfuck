<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0B1026; }
      .accent { fill: #6A7AA0; }
      .primary { fill: #F0F0F0; }
      .secondary { fill: #FFB800; }
      .code { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; font-weight: 600; }
      .title { font-family: 'Inter', 'Helvetica', sans-serif; font-weight: 700; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="1280" height="320"/>
  
  <!-- Code Flow Background Pattern -->
  <g opacity="0.1" class="accent">
    <text x="50" y="80" font-size="48" class="code">++++++++[&gt;++++[&gt;++&gt;+++&gt;+++&gt;+&lt;&lt;&lt;&lt;-]&gt;+&gt;+&gt;-&gt;&gt;+[&lt;]&lt;-]&gt;&gt;</text>
    <text x="50" y="140" font-size="48" class="code">.&gt;---.+++++++..+++.&gt;&gt;.&lt;-.&lt;.+++.------.--------.</text>
    <text x="50" y="200" font-size="48" class="code">&gt;&gt;+.&gt;++.+++[&gt;+++&lt;-]&gt;++.----.&gt;++++++++++.</text>
    <text x="50" y="260" font-size="48" class="code">[&gt;+++++[&gt;+++++&lt;-]&lt;-]&gt;&gt;+++.----.&lt;&lt;++.&gt;&gt;---.</text>
  </g>
  
  <!-- Logo on Left (proper proportions from logo.svg) -->
  <g transform="translate(120, 160) scale(0.35)">
    <!-- Left bracket (exact proportions from logo.svg) -->
    <rect x="-181" y="-181" width="18" height="362" rx="6" fill="#6A7AA0"/>
    <rect x="-181" y="-181" width="90" height="18" rx="6" fill="#6A7AA0"/>
    <rect x="-181" y="163" width="90" height="18" rx="6" fill="#6A7AA0"/>
    
    <!-- Right bracket (exact proportions from logo.svg) -->
    <rect x="163" y="-181" width="18" height="362" rx="6" fill="#6A7AA0"/>
    <rect x="91" y="-181" width="90" height="18" rx="6" fill="#6A7AA0"/>
    <rect x="91" y="163" width="90" height="18" rx="6" fill="#6A7AA0"/>
    
    <!-- Symbols (exact proportions from logo.svg) -->
    <polygon points="-126,0 -61,-61 -61,-31 -106,0 -61,31 -61,61" fill="#F0F0F0"/>
    <circle cx="0" cy="0" r="45" fill="#FFB800"/>
    <polygon points="126,0 61,-61 61,-31 106,0 61,31 61,61" fill="#F0F0F0"/>
  </g>

  <!-- Main Content -->
  <g transform="translate(640, 160)">
    <!-- Title -->
    <text x="0" y="-20" text-anchor="middle" font-size="48" class="title primary">advanced-brainfuck</text>
    
    <!-- Tagline -->
    <text x="0" y="20" text-anchor="middle" font-size="18" class="accent">JIT-Accelerated Brainfuck Interpreter</text>
    
    <!-- Key Commands Highlight -->
    <g transform="translate(0, 50)">
      <rect x="-120" y="-12" width="240" height="24" rx="12" class="accent" opacity="0.2"/>
      <text x="0" y="4" text-anchor="middle" font-size="20" class="code secondary">[ &lt; . &gt; ]</text>
    </g>
  </g>
</svg>